<svg width="54" height="54" viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ovalGrad" x1="27" y1="8" x2="27" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2E7A2E"/>
      <stop offset="100%" stop-color="#1A5C2A"/>
    </linearGradient>
    <linearGradient id="strokeGrad" x1="0" y1="0" x2="54" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F5A800"/>
      <stop offset="50%"  stop-color="#6B2D8B"/>
      <stop offset="100%" stop-color="#2E7A2E"/>
    </linearGradient>
  </defs>

  <!-- Oval with green gradient fill and tricolor stroke -->
  <ellipse cx="27" cy="25" rx="16" ry="19"
           fill="url(#ovalGrad)"
           stroke="url(#strokeGrad)" stroke-width="2.5"/>

  <!-- Refined "W" letterform in white -->
  <path d="M19 17 L22 33 L27 25 L32 33 L35 17"
        stroke="white" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>

  <!-- Tricolor ribbon stripes below oval -->
  <rect x="19" y="45" width="5" height="4" rx="1" fill="#F5A800"/>
  <rect x="25" y="45" width="5" height="4" rx="1" fill="#6B2D8B"/>
  <rect x="31" y="45" width="5" height="4" rx="1" fill="#2E7A2E"/>
</svg>
