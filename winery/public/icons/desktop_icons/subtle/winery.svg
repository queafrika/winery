<svg width="54" height="54" viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ovalGradS" x1="27" y1="8" x2="27" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2E7A2E" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1A5C2A" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="strokeGradS" x1="0" y1="0" x2="54" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F5A800"/>
      <stop offset="50%"  stop-color="#6B2D8B"/>
      <stop offset="100%" stop-color="#2E7A2E"/>
    </linearGradient>
  </defs>

  <!-- Oval with faint green fill and tricolor stroke -->
