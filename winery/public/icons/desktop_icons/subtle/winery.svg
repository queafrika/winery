           fill="url(#ovalGradS)"
           stroke="url(#strokeGradS)" stroke-width="2"/>

  <!-- "W" in brand purple -->
  <path d="M19 17 L22 33 L27 25 L32 33 L35 17"
        stroke="#6B2D8B" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>

  <!-- Tricolor ribbon stripes below oval -->
  <rect x="19" y="45" width="5" height="4" rx="1" fill="#F5A800" fill-opacity="0.55"/>
  <rect x="25" y="45" width="5" height="4" rx="1" fill="#6B2D8B" fill-opacity="0.55"/>
  <rect x="31" y="45" width="5" height="4" rx="1" fill="#2E7A2E" fill-opacity="0.55"/>
</svg>
